services:
  - type: web
    name: ordernest-api-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: SSO_JWKS_URL
        value: "http://localhost:8090/.well-known/jwks.json"
      - key: ROUTE_SSO_BASE_URL
        value: "http://localhost:8090"
      - key: ROUTE_INVENTORY_BASE_URL
        value: "http://localhost:8081"
      - key: ROUTE_ORDER_BASE_URL
        value: "http://localhost:8082"
      - key: ROUTE_PAYMENT_BASE_URL
        value: "http://localhost:8083"
